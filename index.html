<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>弘盛工程行 · 財務管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --green:#1D9E75;--green-dk:#0F6E56;--green-lt:#E1F5EE;
  --red:#E24B4A;--red-lt:#FCEBEB;
  --blue:#185FA5;--blue-lt:#E6F1FB;
  --amber:#BA7517;--amber-lt:#FAEEDA;
  --bg:#F4F3F0;--sur:#FFFFFF;--sur2:#F8F7F5;
  --bd:rgba(0,0,0,0.08);--bd2:rgba(0,0,0,0.14);
  --tx:#1A1A18;--tx2:#6B6B67;--tx3:#9B9B97;
  --r:12px;--rs:8px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#141413;--sur:#1E1E1C;--sur2:#262624;
  --bd:rgba(255,255,255,0.08);--bd2:rgba(255,255,255,0.14);
  --tx:#F0EFE8;--tx2:#9B9B97;--tx3:#6B6B67;
  --green-lt:#0F3028;--red-lt:#2E1515;--blue-lt:#0C1E33;--amber-lt:#2E1F08;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--sur);border-radius:16px;border:0.5px solid var(--bd);padding:32px 24px;width:100%;max-width:360px}
.login-logo{font-size:13px;color:var(--tx3);margin-bottom:4px}
.login-title{font-size:22px;font-weight:700;margin-bottom:24px;letter-spacing:-.3px}
.login-err{background:var(--red-lt);color:var(--red);font-size:13px;padding:10px 12px;border-radius:var(--rs);margin-bottom:14px;display:none}

/* APP */
.app{max-width:460px;margin:0 auto;min-height:100vh}
.topbar{background:var(--sur);border-bottom:0.5px solid var(--bd);padding:12px 16px 10px;position:sticky;top:0;z-index:100}
.topbar-co{font-size:11px;color:var(--tx3);letter-spacing:.5px}
.topbar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.topbar-title{font-size:17px;font-weight:700;letter-spacing:-.3px}
.topbar-right{display:flex;align-items:center;gap:8px}
.export-top{background:none;border:0.5px solid var(--bd2);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--tx2);cursor:pointer;font-family:inherit}
.logout-btn{background:none;border:none;font-size:12px;color:var(--tx3);cursor:pointer;font-family:inherit;padding:5px 8px}
.readonly-badge{background:var(--amber-lt);color:var(--amber);font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--sur2);border:0.5px solid var(--bd2);border-radius:var(--rs);padding:8px 12px}
.search-bar input{flex:1;border:none;background:none;font-size:13px;color:var(--tx);font-family:inherit;outline:none}
.search-bar input::placeholder{color:var(--tx3)}
.search-bar .clear{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:14px;padding:0;line-height:1}
.nav{display:flex;background:var(--sur);border-bottom:0.5px solid var(--bd);position:sticky;top:97px;z-index:99;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nb{flex:1;min-width:56px;padding:10px 2px 9px;font-size:11.5px;font-family:inherit;border:none;background:none;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.nb.on{color:var(--green);border-bottom-color:var(--green);font-weight:500}
.content{padding:14px 12px 90px}
.card{background:var(--sur);border-radius:var(--r);border:0.5px solid var(--bd);padding:14px;margin-bottom:10px}
.ci{padding:10px 14px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.st{background:var(--sur2);border-radius:var(--rs);padding:11px 12px}
.st .lb{font-size:10.5px;color:var(--tx3);margin-bottom:4px;letter-spacing:.3px}
.st .vl{font-size:15px;font-weight:700;letter-spacing:-.3px}
.cg{color:var(--green)}.cr{color:var(--red)}.cb{color:var(--blue)}.ca{color:var(--amber)}
.sec{font-size:11px;font-weight:700;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin:16px 0 8px 2px}
.tr{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--bd)}
.tr:last-child{border-bottom:none}
.ti-ico{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:1px;font-weight:700}
.ti-ico.inc{background:var(--green-lt);color:var(--green)}
.ti-ico.exp{background:var(--red-lt);color:var(--red)}
.ti-info{flex:1;min-width:0}
.ti-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ti-meta{font-size:11px;color:var(--tx3);margin-top:2px}
.ti-right{text-align:right;flex-shrink:0}
.amt{font-size:14px;font-weight:700;letter-spacing:-.3px}
.amt.inc{color:var(--green)}.amt.exp{color:var(--red)}
.bdg{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;margin-top:3px;font-weight:500}
.bdg.done{background:var(--green-lt);color:var(--green-dk)}
.bdg.wait{background:var(--amber-lt);color:var(--amber)}
.bdg.tp{background:var(--blue-lt);color:var(--blue)}
.bdg.topup{background:var(--green-lt);color:var(--green-dk)}
.bdg.src{background:var(--sur2);color:var(--tx2);border:0.5px solid var(--bd2)}
.pw{background:var(--bd);border-radius:20px;height:5px;overflow:hidden;margin-top:7px}
.pf{height:5px;border-radius:20px;background:var(--green)}
.pf.am{background:#EF9F27}
.pl{display:flex;justify-content:space-between;font-size:10px;color:var(--tx3);margin-top:3px}
.oil-hdr{background:var(--green);border-radius:var(--r);padding:16px;color:white;margin-bottom:10px}
.oil-hdr .lb{font-size:11px;opacity:.75;margin-bottom:4px}
.oil-hdr .bal{font-size:28px;font-weight:700;letter-spacing:-.5px}
.oil-hdr .sub{font-size:11px;opacity:.6;margin-top:2px}
.oil-bg{background:rgba(255,255,255,.2);border-radius:20px;height:5px;margin-top:12px}
.oil-fill{background:white;border-radius:20px;height:5px}
.oil-meta{display:flex;justify-content:space-between;margin-top:5px;font-size:10.5px;opacity:.7}
.oil-btn-row{display:flex;gap:8px;margin-top:12px}
.oil-action-btn{flex:1;padding:8px;border-radius:var(--rs);font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit}
.oil-action-btn.use{background:rgba(255,255,255,.2);color:white}
.oil-action-btn.topup{background:white;color:var(--green-dk)}
.arc{background:var(--sur);border-radius:var(--r);border:0.5px solid var(--bd);padding:13px 14px;margin-bottom:8px}
.ar-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.ar-name{font-size:13px;font-weight:700}
.ar-inv{font-size:11px;color:var(--tx3);margin-top:2px}
.ar-total{font-size:15px;font-weight:700;color:var(--blue);text-align:right}
.ar-slbl{font-size:10px;color:var(--tx3);text-align:right;margin-top:1px}
.ar-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.ar-row .l{font-size:12px;color:var(--tx2)}
.ar-row .v{font-size:13px;font-weight:700}
.ar-row .v.got{color:var(--green)}.ar-row .v.owe{color:var(--red)}
.pr{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--bd)}
.pr:last-child{border-bottom:none}
.pr-date{font-size:11px;color:var(--tx3);flex:1}
.pr-amt{font-size:13px;font-weight:700;color:var(--green)}
.fr-row{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none}
.fr-row::-webkit-scrollbar{display:none}
.fb{padding:5px 13px;border-radius:20px;font-size:12px;border:0.5px solid var(--bd2);background:var(--sur);color:var(--tx2);cursor:pointer;white-space:nowrap;font-family:inherit}
.fb.on{background:var(--green);color:white;border-color:var(--green)}
.fab{position:fixed;bottom:22px;right:16px;width:50px;height:50px;border-radius:50%;background:var(--green);color:white;border:none;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(29,158,117,.35)}
.fab:active{transform:scale(.93)}
.mo-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;z-index:200}
.mo-box{background:var(--sur);border-radius:20px 20px 0 0;padding:20px 16px 36px;width:100%;max-height:90vh;overflow-y:auto}
.mo-handle{width:36px;height:4px;background:var(--bd2);border-radius:2px;margin:0 auto 16px}
.mo-title{font-size:16px;font-weight:700;margin-bottom:16px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;color:var(--tx3);margin-bottom:5px;font-weight:500;letter-spacing:.3px;text-transform:uppercase}
.fg input,.fg select{width:100%;padding:10px 12px;border:0.5px solid var(--bd2);border-radius:var(--rs);font-size:14px;background:var(--sur2);color:var(--tx);font-family:inherit;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--green)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-row{display:flex;gap:8px;margin-top:18px}
.btn{flex:1;padding:12px;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;border:0.5px solid var(--bd2);font-family:inherit}
.btn:active{opacity:.8}
.btn.pri{background:var(--green);color:white;border-color:var(--green)}
.btn.sec{background:var(--sur2);color:var(--tx)}
.btn.danger{background:var(--red-lt);color:var(--red);border-color:var(--red)}
.eb{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:13px;padding:3px 5px;border-radius:5px;line-height:1}
.eb.del{color:var(--red)}
.add-pay-btn{width:100%;margin-top:10px;padding:8px;background:var(--green-lt);color:var(--green);border:none;border-radius:var(--rs);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:var(--tx3);font-size:13px}
.spin{width:28px;height:28px;border:2.5px solid var(--bd2);border-top-color:var(--green);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:var(--tx3);font-size:13px}
.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);background:var(--tx);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.note-box{font-size:11px;color:var(--tx3);margin-top:6px;padding-top:6px;border-top:0.5px solid var(--bd);font-style:italic}
.total-bar{display:flex;justify-content:space-between;align-items:center;background:var(--red-lt);border-radius:var(--rs);padding:10px 14px;margin-bottom:10px}
.total-bar .lbl{font-size:12px;color:var(--red);font-weight:500}
.total-bar .val{font-size:16px;font-weight:700;color:var(--red)}
.hl{background:rgba(255,220,0,.35);border-radius:3px}
/* vendor select with add */
.vd-wrap{position:relative}
.vd-wrap select{width:100%;padding:10px 12px;border:0.5px solid var(--bd2);border-radius:var(--rs);font-size:14px;background:var(--sur2);color:var(--tx);font-family:inherit;outline:none}
.vd-wrap select:focus{border-color:var(--green)}
.add-vd-btn{margin-top:6px;background:none;border:0.5px dashed var(--bd2);border-radius:var(--rs);width:100%;padding:8px;font-size:12px;color:var(--tx3);cursor:pointer;font-family:inherit;text-align:left}
.add-vd-btn:hover{border-color:var(--green);color:var(--green)}
@media(min-width:600px){.app{max-width:520px}.content{padding:16px 16px 90px}.nav{top:105px}}
</style>

<body>

    <div class="fg"><label>Email</label><input id="lemail" type="email" placeholder="doris840821@gmail.com" autocomplete="email"></div>
    <div class="fg"><label>密碼</label><input id="lpwd" type="password" placeholder="輸入密碼" autocomplete="current-password"></div>

<script>
const SUPA='https://afeyxcvkylznlckoveil.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmZXl4Y3ZreWx6bmxja292ZWlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NDc4NDIsImV4cCI6MjA5MzAyMzg0Mn0.HHUNxpu6wwTRTzIxLLCtZDftZwYc3PlCR0tTruFuvUk';

let SESSION=null; // null = guest, token = logged in
let isAuth=false;

function authHeaders(){
  const h={'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+(SESSION||KEY)};
  if(SESSION) h['Prefer']='';
  return h;
}

async function db(tb,mt='GET',bd=null,qs=''){
  const h={...authHeaders()};
  if(mt==='POST') h['Prefer']='return=representation';
  const r=await fetch(SUPA+'/rest/v1/'+tb+qs,{method:mt,headers:h,body:bd?JSON.stringify(bd):null});
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):null;
}

async function doLogin(){
  const email=document.getElementById('lemail').value.trim();
  const pwd=document.getElementById('lpwd').value;
  document.getElementById('loginErr').style.display='none';
  try{
    const r=await fetch(SUPA+'/auth/v1/token?grant_type=password',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':KEY},
      body:JSON.stringify({email,password:pwd})
    });
    const d=await r.json();
    if(!r.ok||!d.access_token) throw new Error('failed');
    SESSION=d.access_token;
    isAuth=true;
    startApp();
  }catch(e){
    document.getElementById('loginErr').style.display='block';
  }
}

function guestMode(){
  SESSION=null;
  isAuth=false;
  startApp();
}

function doLogout(){
  SESSION=null;isAuth=false;
  document.getElementById('appWrap').style.display='none';
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('fab').style.display='none';
}

function startApp(){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('appWrap').style.display='block';
  document.getElementById('roLabel').style.display=isAuth?'none':'inline-block';
  document.getElementById('logoutBtn').style.display=isAuth?'inline-block':'none';
  document.getElementById('fab').style.display=isAuth?'flex':'none';
  init();
}

// enter key on login
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('loginWrap').style.display!=='none')doLogin();});

let tab='dash',txF='all',arF='all',coF='all',searchQ='';
let TXS=[],ARS=[],OILS=[],COS=[];

// 廠商清單（可動態新增）
let VENDORS=[
  '晉麒企業','中央吊車','力泰起重','鑫記五金','公司支出-薪水','公司支出-油錢',
  '井源工程行','壩鑫企業有限公司','井元有限公司','正興機械','嘉泰汽車','耀慶國際',
  '良錦工程行','榮越石業有限公司','承毅基礎營造','展鉅國際興業有限公司','帛恆企業有限公司',
  '三鐽有限公司','順益企業有限公司','巨金機電有限公司','益昌氣體有限公司',
  '中國銲條機械股份有限公司','騰翔氣體有限公司','北邑運輸有限公司','中原氣體有限公司',
  '裕升起重行','興偉五金有限公司','宏達全球股份有限公司','皓鑫鋼業有限公司',
  '日立昇起重工程行','各保企業有限公司','揚億機械五金','詠達鋼業','全穩實業股份有限公司',

];

// 載入儲存的廠商
function loadVendors(){
  try{const s=localStorage.getItem('hs_vendors');if(s)VENDORS=JSON.parse(s);}catch(e){}
}
function saveVendors(){
  try{localStorage.setItem('hs_vendors',JSON.stringify(VENDORS));}catch(e){}
}
function addVendor(name){
  if(!name||VENDORS.includes(name))return;
  VENDORS.push(name);saveVendors();
}

// 廠商下拉 HTML
function vendorSelect(id,val=''){
  return`<div class="vd-wrap">
  <select id="${id}">${VENDORS.map(v=>'<option value="'+v+'"'+(v===val?' selected':'')+'>'+v+'</option>').join('')}</select>
  ${isAuth?'<button type="button" class="add-vd-btn" onclick="promptAddVendor(\''+id+'\')">＋ 新增廠商到清單</button>':''}
</div>`;
}

function promptAddVendor(selectId){
  const name=prompt('輸入新廠商名稱：');
  if(!name||!name.trim())return;
  addVendor(name.trim());
  // 重新渲染 select
  const wrap=document.getElementById(selectId).parentElement;
  wrap.innerHTML=`<select id="${selectId}">${VENDORS.map(v=>'<option value="'+v+'"'+(v===name.trim()?' selected':'')+'>'+v+'</option>').join('')}</select>${isAuth?'<button type="button" class="add-vd-btn" onclick="promptAddVendor(\''+selectId+'\')">＋ 新增廠商到清單</button>':''}`;
}

const oilTotalTopup=c=>(c.topups||[]).reduce((s,t)=>s+Number(t.amount),0);
const oilTotalUsed=c=>(c.logs||[]).reduce((s,l)=>s+Number(l.amount),0);
const oilR=c=>oilTotalTopup(c)-oilTotalUsed(c);
const arG=r=>(r.payments||[]).reduce((s,p)=>s+Number(p.amount),0);
const arO=r=>Number(r.total_amount)-arG(r);
const fmt=n=>'$'+Math.round(n).toLocaleString();
const fd=d=>d?d.replace(/-/g,'/'):'-';
const today=()=>new Date().toISOString().slice(0,10);

function hl(text,q){
  if(!q)return text;
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return String(text).replace(re,'<span class="hl">$1</span>');
}

async function init(){
  loadVendors();
  try{
    const[txs,ars,oils,cos]=await Promise.all([
      db('transactions','GET',null,'?select=*&order=date.desc'),
      db('receivables','GET',null,'?select=*&order=created_at.asc'),
      db('oil_cards','GET',null,'?select=*&order=created_at.asc'),
      db('company_expenses','GET',null,'?select=*&order=freq.asc,date.asc,created_at.asc'),
    ]);
    if(isAuth){
      if(!txs||txs.length===0)for(const t of SEED_TX)await db('transactions','POST',t);
      if(!ars||ars.length===0)for(const r of SEED_AR)await db('receivables','POST',r);
      if(!oils||oils.length===0)for(const o of SEED_OIL)await db('oil_cards','POST',o);
      if(!cos||cos.length===0)for(const c of SEED_CO)await db('company_expenses','POST',c);
    }
    await loadAll();
    if(isAuth){ const added=await checkAutoMonthly(); if(added) await loadAll(); }
  }catch(e){
    document.getElementById('content').innerHTML='<div class="loading"><p style="color:var(--red)">連線失敗：'+e.message+'</p></div>';
  }
}

async function loadAll(){
  const[txs,ars,oils,cos]=await Promise.all([
    db('transactions','GET',null,'?select=*&order=date.desc'),
    db('receivables','GET',null,'?select=*&order=created_at.asc'),
    db('oil_cards','GET',null,'?select=*&order=created_at.asc'),
    db('company_expenses','GET',null,'?select=*&order=freq.asc,date.asc,created_at.asc'),
  ]);
  TXS=txs||[];ARS=ars||[];OILS=oils||[];COS=cos||[];
  render();
}

function onSearch(v){
  searchQ=v.trim();
  document.getElementById('clearBtn').style.display=searchQ?'block':'none';
  render();
}
function clearSearch(){
  searchQ='';
  document.getElementById('gSearch').value='';
  document.getElementById('clearBtn').style.display='none';
  render();
}

function go(t){
  tab=t;
  document.querySelectorAll('.nb').forEach((b,i)=>b.classList.toggle('on',['dash','tx','ar','oil','co'][i]===t));
  render();
}
function render(){
  if(searchQ){document.getElementById('content').innerHTML=rSearch();return;}
  document.getElementById('content').innerHTML={dash:rDash,tx:rTx,ar:rAR,oil:rOil,co:rCO}[tab]();
}

  const total=txHits.length+arHits.length+coHits.length;

// ── DASHBOARD ──
function rDash(){
  const inc=TXS.filter(t=>t.direction==='收入');
  const totI=inc.reduce((s,t)=>s+Number(t.amount),0);
  const txGot=inc.filter(t=>t.status==='已匯款').reduce((s,t)=>s+Number(t.amount),0);
  const arGotTotal=ARS.reduce((s,r)=>s+arG(r),0);
  const gotI=txGot+arGotTotal;
  const txPending=inc.filter(t=>t.status==='待匯款').reduce((s,t)=>s+Number(t.amount),0);
  const arPending=ARS.reduce((s,r)=>s+arO(r),0);
  const txExp=TXS.filter(t=>t.direction==='支出').reduce((s,t)=>s+Number(t.amount),0);
  const coExp=COS.reduce((s,e)=>s+Number(e.amount),0);
  const totE=txExp+coExp;
  const bal=txGot-totE;
  const arT=ARS.reduce((s,r)=>s+Number(r.total_amount),0);
  const oilL=OILS.reduce((s,c)=>s+oilR(c),0);
  return`
<div class="sec" style="margin-top:2px">收入概況</div>
<div class="g2">
  <div class="st"><div class="lb">總收入</div><div class="vl cb">${fmt(totI)}</div></div>
  <div class="st"><div class="lb">已收款</div><div class="vl cg">${fmt(gotI)}</div></div>
</div>
<div class="g2">
  <div class="st"><div class="lb">收支明細未收款</div><div class="vl ca">${fmt(txPending)}</div><div style="font-size:10px;color:var(--tx3);margin-top:3px">待匯款紀錄合計</div></div>
  <div class="st"><div class="lb">應收帳款未收款</div><div class="vl ca">${fmt(arPending)}</div><div style="font-size:10px;color:var(--tx3);margin-top:3px">扣除已收部分</div></div>
</div>
<div class="g2">
  <div class="st"><div class="lb">總支出</div><div class="vl cr">${fmt(totE)}</div><div style="font-size:10px;color:var(--tx3);margin-top:3px">含公司支出 ${fmt(coExp)}</div></div>
  <div class="st"><div class="lb">實際結餘</div><div class="vl ${bal>=0?'cg':'cr'}">${fmt(bal)}</div></div>
</div>
<div class="sec">應收帳款</div>
<div class="card" style="padding:13px 14px">
  <div style="display:flex;justify-content:space-between;margin-bottom:10px">
    <div><div style="font-size:11px;color:var(--tx3);margin-bottom:3px">合約總額</div><div style="font-size:17px;font-weight:700;color:var(--blue)">${fmt(arT)}</div></div>
    <div style="text-align:right"><div style="font-size:11px;color:var(--tx3);margin-bottom:3px">未收餘款</div><div style="font-size:17px;font-weight:700;color:var(--red)">${fmt(arPending)}</div></div>
  </div>
  <div class="pw"><div class="pf" style="width:${arT?Math.round(arGotTotal/arT*100):0}%"></div></div>
  <div class="pl"><span>已收 ${fmt(arGotTotal)}</span><span>${arT?Math.round(arGotTotal/arT*100):0}%</span></div>
</div>

// ── TX ──
function rTx(){
  let L=[...TXS];
  if(txF==='收入')L=L.filter(t=>t.direction==='收入');
  else if(txF==='支出')L=L.filter(t=>t.direction==='支出');
  else if(txF==='待匯款')L=L.filter(t=>t.status==='待匯款');
  const totalInc=TXS.filter(t=>t.direction==='收入').reduce((s,t)=>s+Number(t.amount),0);
  const totalExp=TXS.filter(t=>t.direction==='支出').reduce((s,t)=>s+Number(t.amount),0);
  const cats={};
  TXS.filter(t=>t.direction==='支出').forEach(t=>{cats[t.type]=(cats[t.type]||0)+Number(t.amount);});
  const catRows=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  return`
<div class="g2">
  <div class="st"><div class="lb">收入總計</div><div class="vl cg">${fmt(totalInc)}</div></div>
  <div class="st"><div class="lb">支出總計</div><div class="vl cr">${fmt(totalExp)}</div></div>
</div>
<div class="sec">支出類別統整</div>
<div class="card ci">
${catRows.map(([type,amt])=>{

  return`<div class="tr" style="align-items:center">

</div>`;}).join('')}

<div class="fr-row">
${[['all','全部'],['收入','收入'],['支出','支出'],['待匯款','待匯款']].map(([v,l])=>`<button class="fb ${txF===v?'on':''}" onclick="txF='${v}';render()">${l}</button>`).join('')}

<div class="card ci">
${L.length===0?'<div class="empty">沒有記錄</div>':L.map(t=>`<div class="tr">

// ── OIL ──
function rOil(){
  return OILS.map(c=>{
    const rem=oilR(c),totTop=oilTotalTopup(c),pct=totTop?Math.round(rem/totTop*100):0;
    const sorted=[...(c.topups||[]).map(t=>({...t,kind:'topup'})),...(c.logs||[]).map(l=>({...l,kind:'use'}))].sort((a,b)=>a.date.localeCompare(b.date));
    let running=0;
    const withBal=sorted.map(e=>{running+=e.kind==='topup'?Number(e.amount):-Number(e.amount);return{...e,bal:running};});
    const rows=[...withBal].reverse().map(entry=>{
      const isTopup=entry.kind==='topup';
      const origArr=isTopup?(c.topups||[]):(c.logs||[]);
      const origIdx=origArr.findIndex(x=>x.date===entry.date&&Number(x.amount)===Number(entry.amount));
      return`<div class="tr" style="align-items:center">
        <div style="flex:1"><div style="font-size:12px;color:var(--tx3)">${fd(entry.date)}</div>${isTopup?'<span class="bdg topup" style="margin-top:3px">儲值</span>':''}</div>
        <div style="font-size:13px;font-weight:700;color:${isTopup?'var(--green)':'var(--red)'};margin-right:8px">${isTopup?'+':'−'}${fmt(entry.amount)}</div>
        <div style="text-align:right;min-width:72px"><div style="font-size:10px;color:var(--tx3)">餘額</div><div style="font-size:13px;font-weight:700">${fmt(entry.bal)}</div></div>
        ${isAuth?'<button class="eb del" style="margin-left:6px" onclick="'+(isTopup?'delOilTopup':'delOilLog')+'('+c.id+','+origIdx+')">✕</button>':''}
      </div>`;
    });
    return`<div class="oil-hdr">
  <div class="lb">${c.name}</div><div class="bal">${fmt(rem)}</div>
  <div class="sub">總儲值 ${fmt(totTop)} · 已使用 ${fmt(oilTotalUsed(c))}</div>
  <div class="oil-bg"><div class="oil-fill" style="width:${Math.min(pct,100)}%"></div></div>
  <div class="oil-meta"><span>剩餘 ${pct}%</span><span>共 ${(c.topups||[]).length} 次儲值</span></div>
  ${isAuth?`<div class="oil-btn-row">
    <button class="oil-action-btn use" onclick="oOilUse(${c.id})">記錄加油</button>
    <button class="oil-action-btn topup" onclick="oOilTopup(${c.id})">儲值油卡</button>
  </div>`:''}
</div>
<div class="sec">所有記錄</div>
<div class="card ci">${rows.length?rows.join(''):'<div class="empty">尚無記錄</div>'}</div>`;
  }).join('');
}

const MONTHLY_AUTO=[
  {name:'倉庫租金',amount:30000,freq:'每月'},
  {name:'公司租金',amount:15000,freq:'每月'},
  {name:'會計費用',amount:36000,freq:'每月'},
];

async function checkAutoMonthly(){
  if(!isAuth) return false;
  const now=new Date();
  const ym=now.toISOString().slice(0,7);
  const firstDay=ym+'-01';
  let added=false;
  for(const item of MONTHLY_AUTO){
    const existing=COS.find(e=>e.name===item.name&&e.period===ym);
    if(!existing){
      await db('company_expenses','POST',{name:item.name,amount:item.amount,freq:item.freq,period:ym,date:firstDay,note:'自動新增'});
      toast('已自動新增 '+now.getFullYear()+'/'+(now.getMonth()+1)+' '+item.name);
      added=true;
    }
  }
  return added;
}

// ── DELETE PAYMENT ──
async function delPay(arId,idx){
  if(!confirm('確定刪除這筆收款記錄？收支明細內對應的收入也會一併刪除'))return;
  const r=ARS.find(x=>x.id===arId);if(!r)return;
  const pay=(r.payments||[])[idx];
  // 連動刪除收支明細
  if(pay&&pay.txDbId){
    await db('transactions','DELETE',null,'?id=eq.'+pay.txDbId);
  } else if(pay&&pay.txId){
    // 舊資料用 note 比對刪除
    await db('transactions','DELETE',null,'?note=like.*[AR:'+pay.txId+']*');
  }
  const payments=(r.payments||[]).filter((_,i)=>i!==idx);
  await db('receivables','PATCH',{payments},'?id=eq.'+arId);
  await loadAll();toast('已刪除收款記錄，收支明細已同步');
}

function mo(title,html,onSave,onDel=null){

function exportExcel(){
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ['日期','類型','收/支','對象/廠商','金額','匯款狀態','發票號碼','備註'],
    ...TXS.map(t=>[fd(t.date),t.type,t.direction,t.source,Number(t.amount),t.status,t.invoice||'',t.note||''])
  ]),'收支明細');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ['客戶','發票','合約總額','已收款','未收餘款','備註'],
    ...ARS.map(r=>[r.client,r.invoice||'',Number(r.total_amount),arG(r),arO(r),r.note||''])
  ]),'應收款項');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ['油卡','日期','類型','金額','備註'],
    ...OILS.flatMap(c=>[
      ...(c.topups||[]).map(t=>[c.name,fd(t.date),'儲值',Number(t.amount),t.note||'']),
      ...(c.logs||[]).map(l=>[c.name,fd(l.date),'加油',Number(l.amount),''])
    ].sort((a,b)=>a[1].localeCompare(b[1])))
  ]),'油卡記錄');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ['廠商/項目','日期','區間','金額','頻率','備註'],
    ...COS.map(e=>[e.name,fd(e.date)||'',e.period||'',Number(e.amount),e.freq,e.note||''])
  ]),'公司支出');
  XLSX.writeFile(wb,'弘盛財務_'+today()+'.xlsx');
  toast('Excel 已匯出');
}
</script>
