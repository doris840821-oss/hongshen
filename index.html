function ah(){
  return {'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+(SESSION||KEY)};
}
async function db(tb,mt,bd,qs){
  mt=mt||'GET';qs=qs||'';
  const h=ah();
  if(mt==='POST')h['Prefer']='return=representation';
  const r=await fetch(SUPA+'/rest/v1/'+tb+qs,{method:mt,headers:h,body:bd?JSON.stringify(bd):null});
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):null;
}

async function doLogin(){
  const email=document.getElementById('lemail').value.trim();
  const pwd=document.getElementById('lpwd').value;
  document.getElementById('loginErr').style.display='none';
  try{
    const r=await fetch(SUPA+'/auth/v1/token?grant_type=password',{
      method:'POST',headers:{'Content-Type':'application/json','apikey':KEY},
      body:JSON.stringify({email,password:pwd})
    });
    const d=await r.json();
    if(!r.ok||!d.access_token)throw new Error('failed');
    SESSION=d.access_token;isAuth=true;startApp();
  }catch(e){document.getElementById('loginErr').style.display='block';}
}
function guestMode(){SESSION=null;isAuth=false;startApp();}
function startApp(){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('appWrap').style.display='block';
  buildApp();
  init();
}

function loadVendors(){try{var s=localStorage.getItem('hs_v');if(s)VENDORS=JSON.parse(s);}catch(e){}}
function saveVendors(){try{localStorage.setItem('hs_v',JSON.stringify(VENDORS));}catch(e){}}
function addVendor(name){if(!name||VENDORS.includes(name))return;VENDORS.push(name);saveVendors();}
function promptAddVendor(btn){
  var sid=btn.getAttribute('data-sel');
  var name=prompt('輸入新廠商名稱：');
  if(!name||!name.trim())return;
  addVendor(name.trim());
  var sel=document.getElementById(sid);
  if(sel){var opt=document.createElement('option');opt.value=name.trim();opt.text=name.trim();opt.selected=true;sel.add(opt);}
}
function vsel(id,val){
  var opts=VENDORS.map(function(v){return'<option value="'+v+'"'+(v===val?' selected':'')+'>'+v+'</option>';}).join('');
  var addBtn=isAuth?'<button type="button" onclick="promptAddVendor(this)" data-sel="'+id+'" style="margin-top:6px;background:none;border:0.5px dashed rgba(0,0,0,0.14);border-radius:8px;width:100%;padding:8px;font-size:12px;color:#9B9B97;cursor:pointer;font-family:inherit;text-align:left">+ 新增廠商到清單</button>':'';

}

const MONTHLY_AUTO=[
  {name:'倉庫租金',amount:30000,freq:'每月'},
  {name:'公司租金',amount:15000,freq:'每月'},
  {name:'會計費用',amount:36000,freq:'每月'}
];
async function checkAutoMonthly(){
  if(!isAuth)return false;
  var now=new Date();
  var ym=now.toISOString().slice(0,7);
  var firstDay=ym+'-01';
  var added=false;
  for(var i=0;i<MONTHLY_AUTO.length;i++){
    var item=MONTHLY_AUTO[i];
    var existing=COS.find(function(e){return e.name===item.name&&e.period===ym;});
    if(!existing){
      await db('company_expenses','POST',{name:item.name,amount:item.amount,freq:item.freq,period:ym,date:firstDay,note:'自動新增'});
      toast('已自動新增 '+now.getFullYear()+'/'+(now.getMonth()+1)+' '+item.name);
      added=true;
    }
  }
  return added;
}

function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';setTimeout(function(){t.style.opacity='0';},2200);}
function g(id){var el=document.getElementById(id);return el?el.value:'';}
function cmo(){var m=document.getElementById('mo');if(m)m.remove();}
function mo(title,html,onSave,onDel){
  cmo();
  var d=document.createElement('div');d.className='mo-ov';d.id='mo';
  d.innerHTML='<div class="mo-box"><div class="mo-handle"></div><div class="mo-title">'+title+'</div>'+html+'<div class="btn-row">'+(onDel?'<button class="btn danger" id="mo-del">刪除</button>':'')+'<button class="btn sec" onclick="cmo()">取消</button><button class="btn pri" id="mo-sv">儲存</button></div></div>';
  document.body.appendChild(d);
  document.getElementById('mo-sv').onclick=async function(){try{await onSave();cmo();}catch(e){toast('錯誤：'+e.message);}};
  if(onDel)document.getElementById('mo-del').onclick=onDel;
}

function hl(text,q){
  if(!q)return String(text||'');
  return String(text||'').replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span class="hl">$1</span>');
}

function clearSearch(){searchQ='';document.getElementById('gSearch').value='';document.getElementById('clearBtn').style.display='none';render();}
function go(t){tab=t;document.querySelectorAll('.nb').forEach(function(b,i){b.classList.toggle('on',['dash','tx','ar','oil','co'][i]===t);});render();}

async function init(){
  loadVendors();
  try{
    var res=await Promise.all([
      db('transactions','GET',null,'?select=*&order=date.desc'),
      db('receivables','GET',null,'?select=*&order=created_at.asc'),
      db('oil_cards','GET',null,'?select=*&order=created_at.asc'),
      db('company_expenses','GET',null,'?select=*&order=freq.asc,date.asc,created_at.asc')
    ]);
    var txs=res[0],ars=res[1],oils=res[2],cos=res[3];
    if(isAuth){
      if(!txs||txs.length===0)for(var i=0;i<SEED_TX.length;i++)await db('transactions','POST',SEED_TX[i]);
      if(!ars||ars.length===0)for(var i=0;i<SEED_AR.length;i++)await db('receivables','POST',SEED_AR[i]);
      if(!oils||oils.length===0)for(var i=0;i<SEED_OIL.length;i++)await db('oil_cards','POST',SEED_OIL[i]);
      if(!cos||cos.length===0)for(var i=0;i<SEED_CO.length;i++)await db('company_expenses','POST',SEED_CO[i]);
    }
    await loadAll();
    if(isAuth){var added=await checkAutoMonthly();if(added)await loadAll();}
  }catch(e){
    document.getElementById('content').innerHTML='<div class="loading"><p style="color:#E24B4A">連線失敗：'+e.message+'</p></div>';
  }
}
async function loadAll(){
  var res=await Promise.all([
    db('transactions','GET',null,'?select=*&order=date.desc'),
    db('receivables','GET',null,'?select=*&order=created_at.asc'),
    db('oil_cards','GET',null,'?select=*&order=created_at.asc'),
    db('company_expenses','GET',null,'?select=*&order=freq.asc,date.asc,created_at.asc')
  ]);
  TXS=res[0]||[];ARS=res[1]||[];OILS=res[2]||[];COS=res[3]||[];
  render();
}

function rSearch(){
  var q=searchQ.toLowerCase();
  var txH=TXS.filter(function(t){return[t.source,t.type,t.invoice,t.note,t.status,String(t.amount)].some(function(v){return(v||'').toLowerCase().includes(q);});});
  var arH=ARS.filter(function(r){return[r.client,r.invoice,r.note,String(r.total_amount)].some(function(v){return(v||'').toLowerCase().includes(q);});});
  var coH=COS.filter(function(e){return[e.name,e.period,e.note,String(e.amount),e.freq].some(function(v){return(v||'').toLowerCase().includes(q);});});
  var total=txH.length+arH.length+coH.length;
  var html='<div style="font-size:13px;color:#9B9B97;margin-bottom:12px">找到 <strong style="color:#1A1A18">'+total+'</strong> 筆結果</div>';
  if(txH.length){
    html+='<div class="sec">收支明細 ('+txH.length+')</div><div class="card ci">';
    txH.forEach(function(t){html+='<div class="tr"><div class="ti-ico '+(t.direction==='收入'?'inc':'exp')+'">'+(t.direction==='收入'?'↑':'↓')+'</div><div class="ti-info"><div class="ti-name">'+hl(t.source,searchQ)+'</div><div class="ti-meta">'+fd(t.date)+' · <span class="bdg tp">'+t.type+'</span></div>'+(t.invoice?'<div style="font-size:10px;color:#9B9B97">'+hl(t.invoice,searchQ)+'</div>':'')+(t.note?'<div style="font-size:11px;color:#9B9B97">'+hl(t.note,searchQ)+'</div>':'')+'</div><div class="ti-right"><div class="amt '+(t.direction==='收入'?'inc':'exp')+'">'+(t.direction==='收入'?'+':'−')+fmt(t.amount)+'</div><span class="bdg '+(t.status==='已匯款'?'done':'wait')+'">'+t.status+'</span><div><span class="bdg src">收支明細</span></div></div></div>';});
    html+='</div>';
  }
  if(arH.length){
    html+='<div class="sec">應收款項 ('+arH.length+')</div><div class="card ci">';
    arH.forEach(function(r){html+='<div class="tr"><div class="ti-ico inc">↑</div><div class="ti-info"><div class="ti-name">'+hl(r.client,searchQ)+'</div>'+(r.invoice?'<div class="ti-meta">發票 '+hl(r.invoice,searchQ)+'</div>':'')+(r.note?'<div style="font-size:11px;color:#9B9B97">'+hl(r.note,searchQ)+'</div>':'')+'</div><div class="ti-right"><div class="amt inc">'+fmt(r.total_amount)+'</div><div style="font-size:11px;color:#E24B4A">未收 '+fmt(arO(r))+'</div><div><span class="bdg src">應收款項</span></div></div></div>';});
    html+='</div>';
  }
  if(coH.length){
    html+='<div class="sec">公司支出 ('+coH.length+')</div><div class="card ci">';
    coH.forEach(function(e){html+='<div class="tr"><div class="ti-info"><div class="ti-name">'+hl(e.name,searchQ)+'</div><div class="ti-meta">'+(e.date?fd(e.date)+' · ':'')+hl(e.period||'',searchQ)+' <span class="bdg tp">'+e.freq+'</span></div>'+(e.note?'<div style="font-size:11px;color:#9B9B97">'+hl(e.note,searchQ)+'</div>':'')+'</div><div class="ti-right"><div class="amt exp">−'+fmt(e.amount)+'</div><div><span class="bdg src">公司支出</span></div></div></div>';});
    html+='</div>';
  }
  if(total===0)html+='<div class="empty">找不到符合「'+searchQ+'」的記錄</div>';
  return html;
}

function rDash(){
  var inc=TXS.filter(function(t){return t.direction==='收入';});
  var totI=inc.reduce(function(s,t){return s+Number(t.amount);},0);
  var txGot=inc.filter(function(t){return t.status==='已匯款';}).reduce(function(s,t){return s+Number(t.amount);},0);
  var arGotTotal=ARS.reduce(function(s,r){return s+arG(r);},0);
  var gotI=txGot+arGotTotal;
  var txPending=inc.filter(function(t){return t.status==='待匯款';}).reduce(function(s,t){return s+Number(t.amount);},0);
  var arPending=ARS.reduce(function(s,r){return s+arO(r);},0);
  var txExp=TXS.filter(function(t){return t.direction==='支出';}).reduce(function(s,t){return s+Number(t.amount);},0);
  var coExp=COS.reduce(function(s,e){return s+Number(e.amount);},0);
  var totE=txExp+coExp;
  var bal=txGot-totE;
  var arT=ARS.reduce(function(s,r){return s+Number(r.total_amount);},0);
  var oilL=OILS.reduce(function(s,c){return s+oilR(c);},0);
  var recent=TXS.slice(0,5);
  var h='';
  h+='<div class="sec" style="margin-top:2px">收入概況</div>';
  h+='<div class="g2">';
  h+='<div class="st"><div class="lb">總收入</div><div class="vl cb">'+fmt(totI)+'</div></div>';
  h+='<div class="st"><div class="lb">已收款</div><div class="vl cg">'+fmt(gotI)+'</div></div>';
  h+='</div><div class="g2">';
  h+='<div class="st"><div class="lb">收支明細未收款</div><div class="vl ca">'+fmt(txPending)+'</div><div style="font-size:10px;color:#9B9B97;margin-top:3px">待匯款紀錄合計</div></div>';
  h+='<div class="st"><div class="lb">應收帳款未收款</div><div class="vl ca">'+fmt(arPending)+'</div><div style="font-size:10px;color:#9B9B97;margin-top:3px">扣除已收部分</div></div>';
  h+='</div><div class="g2">';
  h+='<div class="st"><div class="lb">總支出</div><div class="vl cr">'+fmt(totE)+'</div><div style="font-size:10px;color:#9B9B97;margin-top:3px">含公司支出 '+fmt(coExp)+'</div></div>';
  h+='<div class="st"><div class="lb">實際結餘</div><div class="vl '+(bal>=0?'cg':'cr')+'">'+fmt(bal)+'</div></div>';
  h+='</div>';
  h+='<div class="sec">應收帳款</div>';
  h+='<div class="card" style="padding:13px 14px">';
  h+='<div style="display:flex;justify-content:space-between;margin-bottom:10px">';
  h+='<div><div style="font-size:11px;color:#9B9B97;margin-bottom:3px">合約總額</div><div style="font-size:17px;font-weight:700;color:#185FA5">'+fmt(arT)+'</div></div>';
  h+='<div style="text-align:right"><div style="font-size:11px;color:#9B9B97;margin-bottom:3px">未收餘款</div><div style="font-size:17px;font-weight:700;color:#E24B4A">'+fmt(arPending)+'</div></div>';
  h+='</div>';
  var pctAR=arT?Math.round(arGotTotal/arT*100):0;
  h+='<div class="pw"><div class="pf" style="width:'+pctAR+'%"></div></div>';
  h+='<div class="pl"><span>已收 '+fmt(arGotTotal)+'</span><span>'+pctAR+'%</span></div></div>';
  h+='<div class="card" style="background:#1D9E75;color:white;cursor:pointer;padding:14px" onclick="go(\'oil\')">';
  h+='<div style="font-size:11px;opacity:.75;margin-bottom:3px">油卡餘額</div>';
  h+='<div style="font-size:22px;font-weight:700">'+fmt(oilL)+'</div>';
  h+='<div style="font-size:11px;opacity:.6;margin-top:2px">點擊查看詳情 →</div></div>';
  h+='<div class="sec">最近交易</div><div class="card ci">';
  recent.forEach(function(t){
    h+='<div class="tr">';
    h+='<div class="ti-ico '+(t.direction==='收入'?'inc':'exp')+'">'+(t.direction==='收入'?'↑':'↓')+'</div>';
    h+='<div class="ti-info"><div class="ti-name">'+t.source+'</div>';
    h+='<div class="ti-meta">'+fd(t.date)+' · <span class="bdg tp">'+t.type+'</span></div></div>';
    h+='<div class="ti-right"><div class="amt '+(t.direction==='收入'?'inc':'exp')+'">'+(t.direction==='收入'?'+':'−')+fmt(t.amount)+'</div>';
    h+='<span class="bdg '+(t.status==='已匯款'?'done':'wait')+'">'+t.status+'</span></div></div>';
  });
  h+='</div>';
  return h;
}

function rTx(){
  var L=[...TXS];
  if(txF==='收入')L=L.filter(function(t){return t.direction==='收入';});
  else if(txF==='支出')L=L.filter(function(t){return t.direction==='支出';});
  else if(txF==='待匯款')L=L.filter(function(t){return t.status==='待匯款';});
  var totalInc=TXS.filter(function(t){return t.direction==='收入';}).reduce(function(s,t){return s+Number(t.amount);},0);
  var totalExp=TXS.filter(function(t){return t.direction==='支出';}).reduce(function(s,t){return s+Number(t.amount);},0);
  var cats={};
  TXS.filter(function(t){return t.direction==='支出';}).forEach(function(t){cats[t.type]=(cats[t.type]||0)+Number(t.amount);});
  var catRows=Object.entries(cats).sort(function(a,b){return b[1]-a[1];});
  var h='';
  h+='<div class="g2">';
  h+='<div class="st"><div class="lb">收入總計</div><div class="vl cg">'+fmt(totalInc)+'</div></div>';
  h+='<div class="st"><div class="lb">支出總計</div><div class="vl cr">'+fmt(totalExp)+'</div></div>';
  h+='</div>';
  h+='<div class="sec">支出類別統整</div><div class="card ci">';
  catRows.forEach(function(row){
    var pct=Math.round(row[1]/totalExp*100);
    h+='<div class="tr" style="align-items:center">';
    h+='<div class="ti-info"><div class="ti-name">'+row[0]+'</div>';
    h+='<div class="pw" style="margin-top:5px"><div class="pf am" style="width:'+pct+'%"></div></div></div>';
    h+='<div class="ti-right" style="min-width:90px"><div class="amt exp">−'+fmt(row[1])+'</div>';
    h+='<div style="font-size:10px;color:#9B9B97;margin-top:2px">'+pct+'%</div></div></div>';
  });
  h+='</div>';
  h+='<div class="fr-row">';
  [['all','全部'],['收入','收入'],['支出','支出'],['待匯款','待匯款']].forEach(function(x){
    h+='<button class="fb '+(txF===x[0]?'on':'')+'" onclick="txF=\''+x[0]+'\';render()">'+x[1]+'</button>';
  });
  h+='</div><div class="card ci">';
  if(L.length===0){h+='<div class="empty">沒有記錄</div>';}
  else{
    L.forEach(function(t){
      h+='<div class="tr">';
      h+='<div class="ti-ico '+(t.direction==='收入'?'inc':'exp')+'">'+(t.direction==='收入'?'↑':'↓')+'</div>';
      h+='<div class="ti-info"><div class="ti-name">'+t.source+'</div>';

function rAR(){

    h+='<div class="pl"><span>已收 '+pct+'%</span><span>'+(ow<=0?'✓ 已結清':'還差 '+fmt(ow))+'</span></div></div>';
    if((r.payments||[]).length){
      h+='<div style="margin-top:10px;padding-top:8px;border-top:0.5px solid rgba(0,0,0,0.08)">';

function rOil(){
  var html='';
  OILS.forEach(function(c){
    var rem=oilR(c),totTop=oilTU(c),pct=totTop?Math.round(rem/totTop*100):0;
    var sorted=[];
    (c.topups||[]).forEach(function(t){sorted.push({date:t.date,amount:t.amount,note:t.note||'',kind:'topup'});});
    (c.logs||[]).forEach(function(l){sorted.push({date:l.date,amount:l.amount,kind:'use'});});
    sorted.sort(function(a,b){return a.date.localeCompare(b.date);});
    var running=0;
    sorted.forEach(function(e){running+=e.kind==='topup'?Number(e.amount):-Number(e.amount);e.bal=running;});
    sorted.reverse();
    html+='<div style="background:#1D9E75;border-radius:12px;padding:16px;color:white;margin-bottom:10px"><div style="font-size:11px;opacity:.75;margin-bottom:4px">'+c.name+'</div><div style="font-size:28px;font-weight:700">'+fmt(rem)+'</div><div style="font-size:11px;opacity:.6;margin-top:2px">總儲值 '+fmt(totTop)+' · 已使用 '+fmt(oilTL(c))+'</div><div class="oil-bg"><div class="oil-fill" style="width:'+Math.min(pct,100)+'%"></div></div><div style="display:flex;justify-content:space-between;margin-top:5px;font-size:10.5px;opacity:.7"><span>剩餘 '+pct+'%</span><span>共 '+(c.topups||[]).length+' 次儲值</span></div>'+(isAuth?'<div class="oil-btn-row"><button class="oil-action-btn" style="background:rgba(255,255,255,.2);color:white" onclick="oOilUse('+c.id+')">記錄加油</button><button class="oil-action-btn" style="background:white;color:#0F6E56" onclick="oOilTopup('+c.id+')">儲值油卡</button></div>':'')+'</div><div class="sec">所有記錄</div><div class="card ci">';
    if(!sorted.length)html+='<div class="empty">尚無記錄</div>';
    sorted.forEach(function(entry){
      var isTopup=entry.kind==='topup';
      var origArr=isTopup?(c.topups||[]):(c.logs||[]);
      var origIdx=origArr.findIndex(function(x){return x.date===entry.date&&Number(x.amount)===Number(entry.amount);});
      html+='<div class="tr" style="align-items:center"><div style="flex:1"><div style="font-size:12px;color:#9B9B97">'+fd(entry.date)+'</div>'+(isTopup?'<span class="bdg topup" style="margin-top:3px">儲值</span>':'')+'</div><div style="font-size:13px;font-weight:700;color:'+(isTopup?'#1D9E75':'#E24B4A')+';margin-right:8px">'+(isTopup?'+':'−')+fmt(entry.amount)+'</div><div style="text-align:right;min-width:72px"><div style="font-size:10px;color:#9B9B97">餘額</div><div style="font-size:13px;font-weight:700">'+fmt(entry.bal)+'</div></div>'+(isAuth?'<button class="eb del" style="margin-left:6px" onclick="'+(isTopup?'delOilTopup':'delOilLog')+'('+c.id+','+origIdx+')">✕</button>':'')+'</div>';
    });
    html+='</div>';
  });
  return html;
}

function rCO(){

async function delPay(arId,idx){
  if(!confirm('確定刪除這筆收款記錄？收支明細內對應的收入也會一併刪除'))return;
  var r=ARS.find(function(x){return x.id===arId;});if(!r)return;
  var pay=(r.payments||[])[idx];
  if(pay&&pay.txDbId)await db('transactions','DELETE',null,'?id=eq.'+pay.txDbId);
  var payments=(r.payments||[]).filter(function(_,i){return i!==idx;});
  await db('receivables','PATCH',{payments:payments},'?id=eq.'+arId);
  await loadAll();toast('已刪除，收支明細已同步');
}

  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['日期','類型','收/支','對象/廠商','金額','匯款狀態','發票號碼','備註']].concat(TXS.map(function(t){return[fd(t.date),t.type,t.direction,t.source,Number(t.amount),t.status,t.invoice||'',t.note||''];}))),'收支明細');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['客戶','發票','合約總額','已收款','未收餘款','備註']].concat(ARS.map(function(r){return[r.client,r.invoice||'',Number(r.total_amount),arG(r),arO(r),r.note||''];}))),'應收款項');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['油卡','日期','類型','金額','備註']].concat(OILS.reduce(function(a,c){return a.concat((c.topups||[]).map(function(t){return[c.name,fd(t.date),'儲值',Number(t.amount),t.note||''];}),(c.logs||[]).map(function(l){return[c.name,fd(l.date),'加油',Number(l.amount),''];}));},[]).sort(function(a,b){return a[1].localeCompare(b[1]);}))),'油卡記錄');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['廠商/項目','日期','區間','金額','頻率','備註']].concat(COS.map(function(e){return[e.name,fd(e.date)||'',e.period||'',Number(e.amount),e.freq,e.note||''];}))),'公司支出');
  XLSX.writeFile(wb,'弘盛財務_'+today()+'.xlsx');
  toast('Excel 已匯出');
}
</script>
